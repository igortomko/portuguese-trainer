<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇧🇷 Português B2 — Игорь</title>
<style>
  :root {
    --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:rgba(255,255,255,0.08);
    --text:#f0f0f4;--muted:#8888aa;--green:#34d399;--red:#f87171;--blue:#60a5fa;
    --yellow:#fbbf24;--purple:#a78bfa;--accent:#6366f1;--orange:#fb923c;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

  /* TOPIC SELECT SCREEN */
  .topic-screen{padding:16px;max-width:560px;margin:0 auto;height:100vh;overflow-y:auto;}
  .app-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px;}
  .app-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;}
  
  .overall-progress{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:20px;}
  .op-title{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
  .op-bar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
  .op-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:99px;transition:width 0.4s;}
  .op-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
  .op-stats .val{color:var(--text);font-weight:700;}

  .section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .topics-grid{display:flex;flex-direction:column;gap:8px;}
  .topic-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;}
  .topic-card:hover{border-color:var(--accent);background:rgba(99,102,241,.06);}
  .topic-card.completed{border-color:var(--green);opacity:.7;}
  .tc-emoji{font-size:24px;flex-shrink:0;}
  .tc-info{flex:1;}
  .tc-title{font-size:14px;font-weight:600;margin-bottom:4px;}
  .tc-meta{font-size:11px;color:var(--muted);}
  .tc-bar{height:3px;background:var(--surface2);border-radius:99px;margin-top:6px;overflow:hidden;}
  .tc-fill{height:100%;border-radius:99px;transition:width .3s;}
  .tc-badge{font-size:10px;padding:2px 8px;border-radius:99px;flex-shrink:0;font-weight:600;}

  /* TRAINER SCREEN */
  .trainer{display:none;height:100vh;flex-direction:column;}
  .trainer-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
  .back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;}
  .trainer-title{font-size:15px;font-weight:700;flex:1;}
  .trainer-progress{font-size:12px;color:var(--muted);}
  .prog-bar{height:3px;background:var(--surface2);}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .4s;}

  .mode-tabs{display:flex;gap:4px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);}
  .mode-tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;}
  .mode-tab.active{background:var(--accent);color:white;}

  .trainer-body{flex:1;overflow-y:auto;padding:12px;}

  /* FLASHCARD */
  .card-counter{text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px;}
  .flashcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px 18px;min-height:270px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;}
  .fc-ctx{font-size:11px;color:var(--orange);background:rgba(251,146,60,.1);padding:3px 10px;border-radius:99px;margin-bottom:12px;}
  .fc-emoji{font-size:32px;margin-bottom:10px;}
  .fc-front{font-size:20px;font-weight:700;line-height:1.4;}
  .fc-tap{font-size:13px;color:var(--muted);margin-top:16px;}
  .fc-back{display:none;width:100%;margin-top:16px;}
  .fc-answer{font-size:18px;font-weight:700;color:var(--green);margin-bottom:6px;line-height:1.4;}
  .fc-pron{font-size:12px;color:var(--purple);margin-bottom:12px;}
  .fc-speak{background:rgba(99,102,241,.15);border:none;color:var(--accent);font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px;cursor:pointer;margin-bottom:10px;}
  .fc-extra{background:var(--surface2);border-radius:10px;padding:10px 14px;font-size:13px;text-align:left;color:var(--muted);line-height:1.5;}

  .card-actions{display:flex;gap:8px;margin-top:10px;}
  .card-actions button{flex:1;padding:12px 6px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
  .btn-wrong{background:rgba(248,113,113,.15);color:var(--red);}
  .btn-hard{background:rgba(251,191,36,.15);color:var(--yellow);}
  .btn-ok{background:rgba(52,211,153,.15);color:var(--green);}

  /* QUIZ */
  .quiz-q{background:var(--surface);border-radius:16px;padding:20px 16px;text-align:center;margin-bottom:10px;}
  .quiz-ctx{font-size:11px;color:var(--orange);margin-bottom:8px;}
  .quiz-emoji{font-size:26px;margin-bottom:8px;}
  .quiz-phrase{font-size:18px;font-weight:700;line-height:1.4;}
  .quiz-opts{display:grid;grid-template-columns:1fr;gap:8px;}
  .quiz-opt{padding:12px 14px;background:var(--surface);border:2px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer;text-align:left;transition:all .15s;}
  .quiz-opt.correct{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green);}
  .quiz-opt.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red);}
  .quiz-opt.show-correct{border-color:var(--green);background:rgba(52,211,153,.06);}
  .quiz-fb{text-align:center;padding:10px;font-size:13px;font-weight:600;min-height:38px;}
  .quiz-fb.ok{color:var(--green);}
  .quiz-fb.fail{color:var(--red);}

  /* ALL LIST */
  .verb-list{display:flex;flex-direction:column;gap:8px;}
  .verb-item{background:var(--surface);border-radius:14px;padding:14px 16px;border-left:3px solid var(--border);}
  .verb-item.s2{border-left-color:var(--green);}
  .verb-item.s0{border-left-color:var(--red);}
  .verb-item.s1{border-left-color:var(--yellow);}
  .vi-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .vi-left{display:flex;align-items:center;gap:10px;}
  .vi-emoji-sm{font-size:22px;}
  .vi-ru{font-size:11px;color:var(--muted);}
  .vi-pt{font-size:16px;font-weight:700;}
  .vi-inf{font-size:12px;color:var(--purple);margin-top:1px;}
  .vi-badge{font-size:10px;padding:2px 8px;border-radius:99px;flex-shrink:0;margin-top:2px;}
  .vi-phrase{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .vi-phrase-pt{font-size:12px;color:var(--muted);font-weight:500;}

  /* RESULTS */
  .result-wrap{background:var(--surface);border-radius:20px;padding:24px 18px;text-align:center;}
  .result-emoji{font-size:52px;margin-bottom:10px;}
  .result-title{font-size:22px;font-weight:700;margin-bottom:6px;}
  .result-sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .res-stat{background:var(--surface2);border-radius:10px;padding:12px 6px;}
  .res-val{font-size:24px;font-weight:700;}
  .res-label{font-size:11px;color:var(--muted);margin-top:2px;}
  .result-100{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);border-radius:10px;padding:10px;margin-bottom:14px;font-size:13px;color:var(--green);font-weight:600;}
  .btn-next{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
  .btn-topics{width:100%;padding:13px;background:var(--surface2);color:var(--text);border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<!-- TOPIC SELECT -->
<div id="topicScreen" class="topic-screen">
  <div class="app-title">🇧🇷 Português B2</div>
  <div class="app-sub">Курс Игоря · 19 тем · до В2</div>

  <div class="overall-progress">
    <div class="op-title">Общий прогресс</div>
    <div class="op-bar"><div class="op-fill" id="overallFill" style="width:0%"></div></div>
    <div class="op-stats">
      <span>✅ <span class="val" id="overallDone">0</span> тем</span>
      <span><span class="val" id="overallCards">0</span> карточек</span>
      <span><span class="val" id="overallPct">0%</span></span>
    </div>
  </div>

  <div class="section-label">Темы курса</div>
  <div class="topics-grid" id="topicsGrid"></div>
</div>

<!-- TRAINER -->
<div id="trainerScreen" class="trainer">
  <div class="trainer-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="trainer-title" id="trainerTitle"></div>
    <div class="trainer-progress" id="trainerProgress"></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flashcard')" id="tab-flashcard">🃏 Карточки</button>
    <button class="mode-tab" onclick="setMode('quiz')" id="tab-quiz">🎯 Квиз</button>
    <button class="mode-tab" onclick="setMode('list')" id="tab-list">📋 Список</button>
  </div>
  <div class="trainer-body" id="trainerBody">
    <!-- FLASHCARD -->
    <div id="modeFlashcard">
      <div class="card-counter" id="cardCounter"></div>
      <div class="flashcard" onclick="revealCard()">
        <div class="fc-ctx" id="fcCtx"></div>
        <div class="fc-emoji" id="fcEmoji"></div>
        <div class="fc-front" id="fcFront"></div>
        <div class="fc-tap" id="fcTap">👆 Нажми чтобы увидеть</div>
        <div class="fc-back" id="fcBack">
          <div class="fc-answer" id="fcAnswer"></div>
          <div class="fc-pron" id="fcPron"></div>
          <button class="fc-speak" onclick="speakNow(event)" id="speakBtn">🔊 Произнести</button>
          <div class="fc-extra" id="fcExtra"></div>
        </div>
      </div>
      <div class="card-actions" id="cardActions" style="display:none">
        <button class="btn-wrong" onclick="rate(0)">❌ Нет</button>
        <button class="btn-hard" onclick="rate(1)">😅 Трудно</button>
        <button class="btn-ok" onclick="rate(2)">✅ Знал</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div id="modeQuiz" style="display:none">
      <div class="card-counter" id="quizCounter"></div>
      <div class="quiz-q">
        <div class="quiz-ctx" id="quizCtx"></div>
        <div class="quiz-emoji" id="quizEmoji"></div>
        <div class="quiz-phrase" id="quizPhrase"></div>
      </div>
      <div class="quiz-opts" id="quizOpts"></div>
      <div class="quiz-fb" id="quizFb"></div>
    </div>

    <!-- LIST MODE -->
    <div id="modeList" style="display:none">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button style="flex:1;padding:12px;background:var(--surface2);border:none;border-radius:10px;color:var(--text);font-weight:700;cursor:pointer;" onclick="sortModeList('default')">По порядку ⬇️</button>
        <button style="flex:1;padding:12px;background:var(--surface2);border:none;border-radius:10px;color:var(--text);font-weight:700;cursor:pointer;" onclick="sortModeList('shuffle')">Вразнобой 🔀</button>
      </div>
      <div class="verb-list" id="modeListContainer"></div>
    </div>

    <!-- RESULTS -->
    <div id="modeResults" style="display:none">
      <div class="result-wrap">
        <div class="result-emoji" id="resEmoji">🎉</div>
        <div class="result-title" id="resTitle"></div>
        <div class="result-sub" id="resSub"></div>
        <div class="result-100" id="res100" style="display:none"></div>
        <div class="result-grid">
          <div class="res-stat"><div class="res-val" id="resOk" style="color:var(--green)">0</div><div class="res-label">Знал</div></div>
          <div class="res-stat"><div class="res-val" id="resHard" style="color:var(--yellow)">0</div><div class="res-label">Трудно</div></div>
          <div class="res-stat"><div class="res-val" id="resWrong" style="color:var(--red)">0</div><div class="res-label">Не знал</div></div>
        </div>
        <button class="btn-next" onclick="nextRound()">Ещё раз →</button>
        <button class="btn-topics" onclick="goBack()">← Все темы</button>
      </div>
    </div>
  </div>
</div>

<script>

  "IGO-110": "f8cafb68-5690-4850-a974-cb547b860453",
  "IGO-111": "c3dc5e70-f188-4322-a500-ae6b68776100"
};

const DONE_STATE = "0eea563b-99b9-4aee-a076-9ff9f47b3a8f";

// ===================== STATE =====================
let S = { currentTopic: null, mode: 'flashcard', queue: [], cur: 0, revealed: false, scores: {}, streak: 0, rOk: 0, rHard: 0, rWrong: 0, currentPt: '' };

// ===================== STORAGE =====================
const STORAGE_KEY = 'pt_b2_scores';
const BACKUP_KEY = 'pt_b2_scores_backup';
const VERSION_KEY = 'pt_b2_version';
const APP_VERSION = '2.1'; // bump this when items change

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(S.scores));
  } catch(e) { console.warn('Save failed', e); }
}

function load() {
  try {
    // Version check: if version changed, backup old progress before loading
    const savedVersion = localStorage.getItem(VERSION_KEY);
    if (savedVersion !== APP_VERSION) {
      const existing = localStorage.getItem(STORAGE_KEY);
      if (existing) {
        // Backup previous progress under a dated key
        const backupKey = BACKUP_KEY + '_' + (savedVersion || 'legacy') + '_' + Date.now();
        localStorage.setItem(backupKey, existing);
        console.log('Progress backed up as', backupKey);
      }
      localStorage.setItem(VERSION_KEY, APP_VERSION);
    }

    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      // Merge: keep existing progress, don't wipe unknown keys
      S.scores = parsed;
    }
  } catch(e) {
    console.warn('Load failed, starting fresh', e);
    S.scores = {};
  }
}

// Emergency export: call exportProgress() in console to get JSON
window.exportProgress = function() {
  const data = localStorage.getItem(STORAGE_KEY);
  console.log('=== PROGRESS EXPORT ===\n' + data);
  return data;
};

// Emergency import: call importProgress('...json...') in console
window.importProgress = function(json) {
  try {
    const parsed = JSON.parse(json);
    S.scores = parsed;
    save();
    renderTopics();
    console.log('Progress imported successfully');
  } catch(e) { console.error('Import failed', e); }
};

function getTopicProgress(topicId) {
  const sc = S.scores[topicId] || {};
  const topic = TOPICS.find(t => t.id === topicId);
  if (!topic) return 0;
  const learned = topic.items.filter(item => sc[item.pt] === 2).length;
  return Math.round(learned / topic.items.length * 100);
}

function getTotalStats() {
  let totalItems = 0, learnedItems = 0, doneTopic = 0;
  TOPICS.forEach(t => {
    totalItems += t.items.length;
    const sc = S.scores[t.id] || {};
    const learned = t.items.filter(item => sc[item.pt] === 2).length;
    learnedItems += learned;
    if (learned === t.items.length) doneTopic++;
  });
  return { totalItems, learnedItems, doneTopic, pct: Math.round(learnedItems/totalItems*100) };
}

// ===================== TOPIC SCREEN =====================
function renderTopics() {
  const stats = getTotalStats();
  document.getElementById('overallFill').style.width = stats.pct + '%';
  document.getElementById('overallDone').textContent = stats.doneTopic;
  document.getElementById('overallCards').textContent = stats.learnedItems;
  document.getElementById('overallPct').textContent = stats.pct + '%';

  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const pct = getTopicProgress(t.id);
    const done = pct === 100;
    
    const card = document.createElement('div');
    card.className = 'topic-card' + (done ? ' completed' : '');
    card.onclick = () => openTopic(t.id);

    const fillColor = done ? 'var(--green)' : pct > 0 ? 'var(--accent)' : 'var(--surface2)';
    const badge = done ? '✅' : pct > 0 ? `${pct}%` : t.dueDate;
    const badgeStyle = done ? 'background:rgba(52,211,153,.15);color:var(--green)' :
                       pct > 0 ? 'background:rgba(99,102,241,.15);color:var(--accent)' :
                       'background:var(--surface2);color:var(--muted)';

    card.innerHTML = `
      <div class="tc-emoji">${t.emoji}</div>
      <div class="tc-info">
        <div class="tc-title">${t.title}</div>
        <div class="tc-meta">${t.desc} · ${t.items.length} карточек</div>
        <div class="tc-bar"><div class="tc-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      </div>
      <div class="tc-badge" style="${badgeStyle}">${badge}</div>
    `;
    grid.appendChild(card);
  });
}

function openTopic(topicId) {
  const topic = TOPICS.find(t => t.id === topicId);
  if (!topic) return;
  S.currentTopic = topicId;
  if (!S.scores[topicId]) S.scores[topicId] = {};

  document.getElementById('topicScreen').style.display = 'none';
  const trainer = document.getElementById('trainerScreen');
  trainer.style.display = 'flex';
  document.getElementById('trainerTitle').textContent = topic.emoji + ' ' + topic.title.split('. ')[1];

  startRound();
}

function goBack() {
  document.getElementById('trainerScreen').style.display = 'none';
  document.getElementById('topicScreen').style.display = 'block';
  renderTopics();
  window.history.pushState({}, '', window.location.pathname);
}

// ===================== ROUND =====================
function startRound() {
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const sc = S.scores[S.currentTopic];
  // Prioritize unknown/hard items
  const weak = topic.items.map((v,i)=>i).filter(i=>(sc[topic.items[i].pt]||0)<2);
  S.queue = shuffle(weak.length > 0 ? weak : topic.items.map((_, i) => i));
  S.cur = 0; S.rOk = S.rHard = S.rWrong = 0;
  setMode(S.mode);
}

function setMode(mode) {
  S.mode = mode;
  ['flashcard','quiz','list'].forEach(m => {
    document.getElementById('tab-'+m).classList.toggle('active', m === mode);
  });
  showModeUI(mode);
  S.cur = 0;
  loadCard();
}

function showModeUI(m) {
  ['modeFlashcard','modeQuiz','modeList','modeResults'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  const map = {flashcard:'modeFlashcard',quiz:'modeQuiz',list:'modeList',results:'modeResults'};
  document.getElementById(map[m] || 'modeFlashcard').style.display = 'block';
}

function loadCard() {
  if (S.cur >= S.queue.length) { showResults(); return; }
  updateTrainerProgress();
  if (S.mode === 'flashcard') loadFlash();
  else if (S.mode === 'quiz') loadQuiz();
  else if (S.mode === 'list') loadListMode();
}

function updateTrainerProgress() {
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const sc = S.scores[S.currentTopic];
  const learned = topic.items.filter(item => sc[item.pt] === 2).length;
  const pct = Math.round(learned / topic.items.length * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('trainerProgress').textContent = `${learned}/${topic.items.length}`;
  document.getElementById('cardCounter').textContent = `${S.cur+1} / ${S.queue.length}`;
  document.getElementById('quizCounter').textContent = `${S.cur+1} / ${S.queue.length}`;
}

// ===================== FLASHCARD =====================
function loadFlash() {
  showModeUI('flashcard');
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const item = topic.items[S.queue[S.cur]];
  S.revealed = false; S.currentPt = item.pt;

  document.getElementById('fcCtx').textContent = topic.emoji + ' ' + topic.title.split('. ')[1];
  document.getElementById('fcEmoji').textContent = item.key ? '🔑' : '💬';
  document.getElementById('fcFront').textContent = item.ru;
  document.getElementById('fcTap').style.display = 'block';
  document.getElementById('fcBack').style.display = 'none';
  document.getElementById('cardActions').style.display = 'none';
  document.getElementById('fcAnswer').textContent = item.pt;
  document.getElementById('fcPron').textContent = item.pron ? '[' + item.pron + ']' : '';
  document.getElementById('fcExtra').innerHTML = item.extra ? item.extra.replace(/\//g, '<br>') : '';
}

function revealCard() {
  if (S.revealed) return;
  S.revealed = true;
  document.getElementById('fcTap').style.display = 'none';
  document.getElementById('fcBack').style.display = 'block';
  document.getElementById('cardActions').style.display = 'flex';
  speak(S.currentPt);
}

function speakNow(e) { e.stopPropagation(); speak(S.currentPt); }

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'pt-BR'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function rate(score) {
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const idx = S.queue[S.cur]; const item = TOPICS.find(t => t.id === S.currentTopic).items[idx];
  S.scores[S.currentTopic][item.pt] = score;
  
  if (score === 2) { S.rOk++; S.streak++; }
  else if (score === 1) { S.rHard++; S.streak = 0; }
  else { S.rWrong++; S.streak = 0; }
  
  if (score < 2 && S.cur < S.queue.length - 1) {
    const pos = Math.min(S.cur + 3 + Math.floor(Math.random()*3), S.queue.length);
    S.queue.splice(pos, 0, S.queue[S.cur]);
  }
  S.cur++;
  save();
  checkTopicComplete();
  loadCard();
}

// ===================== QUIZ =====================
function loadQuiz() {
  showModeUI('quiz');
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const item = topic.items[S.queue[S.cur]];
  S.currentPt = item.pt;

  document.getElementById('quizCtx').textContent = topic.emoji + ' ' + topic.title.split('. ')[1];
  document.getElementById('quizEmoji').textContent = '🔤';
  document.getElementById('quizPhrase').textContent = item.ru;
  document.getElementById('quizFb').textContent = '';
  document.getElementById('quizFb').className = 'quiz-fb';

  const correct = item.pt;
  const others = shuffle(topic.items.filter(v => v.pt !== item.pt)).slice(0,3).map(i => i.pt);
  const opts = shuffle([correct, ...others]);

  const c = document.getElementById('quizOpts');
  c.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => checkQuiz(btn, opt, correct, item);
    c.appendChild(btn);
  });
}

function checkQuiz(btn, sel, correct, item) {
  document.querySelectorAll('.quiz-opt').forEach(b => b.onclick = null);
  const ok = sel === correct;
  btn.classList.add(ok ? 'correct' : 'wrong');
  if (!ok) document.querySelectorAll('.quiz-opt').forEach(b => { if(b.textContent === correct) b.classList.add('show-correct'); });
  
  S.scores[S.currentTopic][item.pt] = ok ? 2 : 0;
  
  if(ok){ S.rOk++; S.streak++; speak(correct); } else { S.rWrong++; S.streak=0; }
  
  const fb = document.getElementById('quizFb');
  fb.textContent = ok ? `✅ Верно!` : `❌ ${item.pt} [${item.pron||''}]`;
  fb.className = 'quiz-fb ' + (ok ? 'ok' : 'fail');
  save(); checkTopicComplete();
  setTimeout(() => { S.cur++; loadCard(); }, 1500);
}

// ===================== LIST MODE =====================
let currentModeList = [];

function loadListMode() {
  showModeUI('list');
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  if (!currentModeList.length || currentModeList.length !== topic.items.length) {
    currentModeList = topic.items.map((_, i) => i);
  }
  renderModeList();
}

function sortModeList(type) {
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  if (type === 'shuffle') {
    currentModeList = shuffle(topic.items.map((_, i) => i));
  } else {
    currentModeList = topic.items.map((_, i) => i);
  }
  renderModeList();
}

function renderModeList() {
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const sc = S.scores[S.currentTopic] || {};
  
  document.getElementById('modeListContainer').innerHTML = currentModeList.map(i => {
    const v = topic.items[i];
    const s = sc[v.pt];
    const cls = s===2?'s2':s===0?'s0':s===1?'s1':'';
    const bc = s===2?'background:rgba(52,211,153,.15);color:var(--green)':s===0?'background:rgba(248,113,113,.15);color:var(--red)':s===1?'background:rgba(251,191,36,.15);color:var(--yellow)':'background:var(--surface2);color:var(--muted)';
    const bl = s===2?'✅ Знаю':s===0?'❌ Сложно':s===1?'😅 Трудно':'🆕 Новый';
    
    return `<div class="verb-item ${cls}">
      <div class="vi-top">
        <div class="vi-left">
          <div class="vi-emoji-sm" onclick="speak('${v.pt.replace(/'/g,"\\'")}')" style="cursor:pointer">🔊</div>
          <div><div class="vi-ru">${v.ru}</div><div class="vi-pt">${v.pt}</div><div class="vi-inf">[${v.pron||''}]</div></div>
        </div>
        <div class="vi-badge" style="${bc}">${bl}</div>
      </div>
      ${v.extra ? `<div class="vi-phrase"><div class="vi-phrase-pt" style="color:var(--muted);font-size:12px">${v.extra.replace(/\//g, '<br>')}</div></div>` : ''}
      <div style="display:flex; gap:6px; margin-top:12px;">
        <button onclick="rateInList('${v.pt.replace(/'/g,"\\'")}', 2)" style="flex:1;padding:8px;border:none;border-radius:8px;background:rgba(52,211,153,.15);color:var(--green);font-weight:700;cursor:pointer">✅</button>
        <button onclick="rateInList('${v.pt.replace(/'/g,"\\'")}', 1)" style="flex:1;padding:8px;border:none;border-radius:8px;background:rgba(251,191,36,.15);color:var(--yellow);font-weight:700;cursor:pointer">😅</button>
        <button onclick="rateInList('${v.pt.replace(/'/g,"\\'")}', 0)" style="flex:1;padding:8px;border:none;border-radius:8px;background:rgba(248,113,113,.15);color:var(--red);font-weight:700;cursor:pointer">❌</button>
      </div>
    </div>`;
  }).join('');
}

window.rateInList = function(ptKey, score) {
  if (!S.scores[S.currentTopic]) S.scores[S.currentTopic] = {};
  S.scores[S.currentTopic][ptKey] = score;
  save();
  updateTrainerProgress();
  checkTopicComplete();
  renderModeList();
};

// ===================== RESULTS =====================
function showResults() {
  showModeUI('results');
  const total = S.rOk + S.rHard + S.rWrong;
  const pct = total ? Math.round(S.rOk/total*100) : 0;
  document.getElementById('resOk').textContent = S.rOk;
  document.getElementById('resHard').textContent = S.rHard;
  document.getElementById('resWrong').textContent = S.rWrong;
  document.getElementById('resEmoji').textContent = pct>=80?'🔥':pct>=60?'💪':'📚';
  document.getElementById('resTitle').textContent = pct>=80?'Отлично!':pct>=60?'Хороший прогресс!':'Продолжай!';
  document.getElementById('resSub').textContent = `${pct}% из ${total} карточек`;

  const topicPct = getTopicProgress(S.currentTopic);
  const r100 = document.getElementById('res100');
  if (topicPct === 100) {
    r100.style.display = 'block';
    r100.textContent = '🎉 Тема выучена на 100%! Задача в Linear отмечена как Done.';
  } else {
    r100.style.display = 'none';
  }
}

function nextRound() {
  startRound();
}

// ===================== LINEAR INTEGRATION =====================
function checkTopicComplete() {
  const topic = TOPICS.find(t => t.id === S.currentTopic);
  const sc = S.scores[S.currentTopic];
  const learned = topic.items.filter(item => sc[item.pt] === 2).length;
  if (learned === topic.items.length && topic.linearId) {
    markLinearDone(topic.linearId);
  }
}

function markLinearDone(linearId) {
  const issueId = LINEAR_ISSUE_IDS[linearId];
  if (!issueId) return;
  fetch('/linear-done', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({issueId, stateId: DONE_STATE})
  }).catch(() => {});
}

// ===================== UTILS =====================
function shuffle(a) {
  const arr = [...a];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ===================== URL ROUTING =====================
function checkUrlTopic() {
  const params = new URLSearchParams(window.location.search);
  const topic = params.get('topic');
  if (topic) {
    const found = TOPICS.find(t => t.id === topic);
    if (found) openTopic(found.id);
  }
}

// ===================== INIT =====================
load();
renderTopics();
checkUrlTopic();
</script>
